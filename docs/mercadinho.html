<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1f3a2e">
<title>Mercadinho</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f6efdd;
    --surface: #ffffff;
    --surface-alt: #ede4cb;
    --primary: #1f3a2e;
    --primary-soft: #2e5443;
    --sage: #7fa088;
    --sage-soft: #c2d4c2;
    --accent: #c9a961;
    --text: #1c251f;
    --muted: #6e7a6a;
    --border: #e0d5b8;
    --border-soft: #efe8d4;
    --danger: #b04a36;
    --danger-soft: #f4dcd4;
    --success: #3f7249;
    --shadow-sm: 0 1px 3px rgba(31, 58, 46, 0.06);
    --shadow: 0 4px 18px rgba(31, 58, 46, 0.08);
    --shadow-lg: 0 10px 40px rgba(31, 58, 46, 0.12);
    --radius: 16px;
    --radius-sm: 10px;
    --radius-xs: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Manrope', system-ui, -apple-system, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    min-height: 100vh;
  }

  body {
    background-image:
      radial-gradient(circle at 15% 0%, rgba(127, 160, 136, 0.08), transparent 50%),
      radial-gradient(circle at 85% 100%, rgba(201, 169, 97, 0.08), transparent 50%);
    background-attachment: fixed;
  }

  h1, h2, h3, h4 {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--primary);
  }

  button, input, select, textarea {
    font: inherit;
    color: inherit;
  }

  button {
    background: none;
    border: none;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  input, select {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    width: 100%;
    outline: none;
    transition: border-color 0.15s, background 0.15s;
    font-size: 15px;
  }

  input:focus, select:focus {
    border-color: var(--sage);
    background: var(--surface);
  }

  /* ---------- Layout ---------- */
  #app {
    max-width: 560px;
    margin: 0 auto;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  @media (min-width: 720px) {
    #app { max-width: 980px; }
  }

  header.app-header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--bg);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 16px 20px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border-soft);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand .logo {
    width: 38px;
    height: 38px;
    border-radius: 11px;
    background: linear-gradient(135deg, var(--primary), var(--primary-soft));
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    box-shadow: var(--shadow-sm);
  }

  .brand .name {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 20px;
    color: var(--primary);
    letter-spacing: -0.01em;
  }

  .brand .tag {
    display: block;
    font-family: 'Manrope', sans-serif;
    font-size: 10.5px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    line-height: 1;
    margin-top: 2px;
  }

  .icon-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--primary);
    transition: all 0.15s;
  }

  .icon-btn:hover, .icon-btn:active {
    background: var(--primary);
    color: var(--surface);
    border-color: var(--primary);
  }

  main {
    padding: 20px;
  }

  @media (min-width: 720px) {
    main { padding: 28px 32px; }
  }

  /* ---------- Hero ---------- */
  .hero {
    margin-bottom: 22px;
  }

  .hero h1 {
    font-size: clamp(28px, 6vw, 36px);
    line-height: 1.1;
    margin-bottom: 6px;
  }

  .hero h1 em {
    font-style: italic;
    color: var(--sage);
    font-weight: 500;
  }

  .hero p {
    color: var(--muted);
    font-size: 14px;
  }

  /* ---------- Filter Chips ---------- */
  .filters {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 6px 20px 4px;
    margin: 0 -20px 18px;
    scrollbar-width: none;
  }

  .filters::-webkit-scrollbar { display: none; }

  .chip {
    flex-shrink: 0;
    padding: 9px 16px;
    border-radius: 999px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--primary-soft);
    font-size: 13.5px;
    font-weight: 600;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .chip[aria-pressed="true"] {
    background: var(--primary);
    border-color: var(--primary);
    color: var(--surface);
  }

  /* ---------- Product Grid ---------- */
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }

  @media (min-width: 560px) {
    .grid { grid-template-columns: repeat(3, 1fr); gap: 16px; }
  }

  @media (min-width: 820px) {
    .grid { grid-template-columns: repeat(4, 1fr); }
  }

  .card {
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    display: flex;
    flex-direction: column;
    transition: transform 0.15s, box-shadow 0.15s;
    border: 1px solid var(--border-soft);
  }

  .card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow);
  }

  .card-img {
    aspect-ratio: 1 / 1;
    width: 100%;
    background: var(--surface-alt);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fraunces', serif;
    font-size: 28px;
    color: var(--primary);
    object-fit: cover;
    overflow: hidden;
  }

  .card-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .card-body {
    padding: 12px 14px 14px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
  }

  .card-cat {
    font-size: 10.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--sage);
  }

  .card-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--primary);
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    min-height: 2.6em;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 8px;
    gap: 6px;
  }

  .card-price {
    font-size: 17px;
    font-weight: 800;
    color: var(--primary);
    font-family: 'Fraunces', serif;
    letter-spacing: -0.02em;
  }

  .card-stock {
    font-size: 11px;
    font-weight: 600;
    color: var(--sage);
    padding: 3px 8px;
    background: var(--sage-soft);
    border-radius: 999px;
  }

  .card-stock.low { color: var(--danger); background: var(--danger-soft); }

  /* ---------- Empty State ---------- */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-icon {
    font-size: 48px;
    margin-bottom: 12px;
    opacity: 0.5;
  }

  /* ---------- Admin Login ---------- */
  .login-box {
    max-width: 360px;
    margin: 60px auto 0;
    background: var(--surface);
    padding: 32px 26px;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid var(--border-soft);
  }

  .login-box h2 {
    font-size: 22px;
    margin-bottom: 6px;
  }

  .login-box p {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 20px;
  }

  .login-box form {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* ---------- Admin Tabs ---------- */
  .admin-tabs {
    display: flex;
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 4px;
    border: 1px solid var(--border);
    margin-bottom: 20px;
    box-shadow: var(--shadow-sm);
  }

  .admin-tab {
    flex: 1;
    padding: 10px;
    border-radius: 7px;
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    transition: all 0.15s;
  }

  .admin-tab[aria-pressed="true"] {
    background: var(--primary);
    color: var(--surface);
  }

  /* ---------- Admin Stock List ---------- */
  .stock-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .stock-item {
    display: flex;
    gap: 12px;
    background: var(--surface);
    padding: 12px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border-soft);
    align-items: flex-start;
  }

  .stock-item .thumb {
    width: 72px;
    height: 72px;
    flex-shrink: 0;
    border-radius: 10px;
    overflow: hidden;
    background: var(--surface-alt);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fraunces', serif;
    color: var(--primary);
    font-size: 22px;
  }

  .stock-item .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .stock-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 6px; }

  .stock-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .stock-name {
    font-weight: 700;
    font-size: 14px;
    color: var(--primary);
    line-height: 1.25;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .stock-cat {
    font-size: 10.5px;
    font-weight: 600;
    color: var(--sage);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .stock-price-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .price-field {
    display: flex;
    align-items: center;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0 8px;
    flex: 1;
    max-width: 120px;
  }

  .price-field span {
    color: var(--muted);
    font-weight: 600;
    font-size: 12.5px;
  }

  .price-field input {
    border: none;
    background: transparent;
    padding: 7px 4px;
    font-weight: 700;
    font-size: 14px;
    color: var(--primary);
    width: 100%;
  }

  .qty-control {
    display: flex;
    align-items: center;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: var(--bg);
    overflow: hidden;
  }

  .qty-btn {
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    color: var(--primary);
    transition: background 0.15s;
  }

  .qty-btn:hover { background: var(--sage-soft); }
  .qty-btn:disabled { color: var(--muted); opacity: 0.4; cursor: not-allowed; }

  .qty-val {
    min-width: 32px;
    text-align: center;
    font-weight: 700;
    font-size: 14px;
    color: var(--primary);
  }

  .stock-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }

  .margin-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 999px;
    background: var(--sage-soft);
    color: var(--primary);
  }

  .margin-badge.low { background: var(--danger-soft); color: var(--danger); }
  .margin-badge.high { background: #d6e7c7; color: var(--success); }

  .delete-btn {
    color: var(--danger);
    padding: 6px;
    border-radius: 6px;
    transition: background 0.15s;
    font-size: 16px;
  }

  .delete-btn:hover { background: var(--danger-soft); }

  /* ---------- Add Product Form ---------- */
  .add-form {
    background: var(--surface);
    padding: 22px 20px;
    border-radius: var(--radius);
    border: 1px solid var(--border-soft);
    box-shadow: var(--shadow-sm);
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .field label {
    display: block;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--primary-soft);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .photo-drop {
    border: 2px dashed var(--border);
    border-radius: var(--radius-sm);
    padding: 20px;
    text-align: center;
    background: var(--surface-alt);
    cursor: pointer;
    transition: all 0.15s;
    aspect-ratio: 16 / 9;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  .photo-drop:hover, .photo-drop.active {
    border-color: var(--sage);
    background: var(--sage-soft);
  }

  .photo-drop img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .photo-drop .icon {
    font-size: 28px;
    color: var(--sage);
    margin-bottom: 6px;
  }

  .photo-drop .hint {
    font-size: 12.5px;
    color: var(--muted);
    font-weight: 500;
  }

  .margin-preview {
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    background: var(--surface-alt);
    border: 1px dashed var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .margin-preview .label {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
  }

  .margin-preview .value {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 22px;
    color: var(--primary);
  }

  .margin-preview .value.negative { color: var(--danger); }

  .btn {
    padding: 13px 20px;
    background: var(--primary);
    color: var(--surface);
    border-radius: var(--radius-sm);
    font-weight: 700;
    font-size: 14.5px;
    transition: transform 0.1s, background 0.15s, opacity 0.15s;
    letter-spacing: 0.01em;
  }

  .btn:hover { background: var(--primary-soft); }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.55; cursor: not-allowed; }

  .btn.ghost {
    background: transparent;
    color: var(--primary);
    border: 1.5px solid var(--border);
  }

  .btn.ghost:hover { background: var(--surface-alt); }

  .btn.danger { background: var(--danger); }
  .btn.danger:hover { background: #8f3a2a; }

  /* ---------- Toasts ---------- */
  #toasts {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 100;
    max-width: calc(100vw - 40px);
  }

  .toast {
    background: var(--primary);
    color: var(--surface);
    padding: 11px 16px;
    border-radius: 999px;
    font-size: 13.5px;
    font-weight: 600;
    box-shadow: var(--shadow-lg);
    animation: toastIn 0.25s ease, toastOut 0.25s 2.5s ease forwards;
    white-space: nowrap;
  }

  .toast.error { background: var(--danger); }
  .toast.success { background: var(--success); }

  @keyframes toastIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes toastOut {
    to { opacity: 0; transform: translateY(10px); }
  }

  /* ---------- Skeleton / Loading ---------- */
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .spinner {
    display: inline-block;
    width: 24px;
    height: 24px;
    border: 2.5px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---------- Utility ---------- */
  .hidden { display: none !important; }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 10px;
  }

  .back-link:hover { color: var(--primary); }

  .section-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin: 4px 0 12px;
  }
</style>
</head>
<body>
<div id="app">
  <header class="app-header">
    <div class="brand">
      <div class="logo">🌿</div>
      <div>
        <div class="name">Mercadinho</div>
        <div class="tag">Condomínio</div>
      </div>
    </div>
    <button id="admin-btn" class="icon-btn" title="Admin" aria-label="Acessar admin">⚙</button>
  </header>

  <main id="main">
    <div class="loading"><div class="spinner"></div></div>
  </main>
</div>

<div id="toasts"></div>

<script>
(function () {
  'use strict';

  // ===== Config =====
  const API = '/api/mercadinho';
  const CATEGORIAS = [
    'Bebidas',
    'Alcoólicos',
    'Doces',
    'Salgados',
    'Padaria',
    'Congelados',
    'Uso Pessoal',
    'Limpeza',
    'Outros'
  ];

  // ===== State =====
  const state = {
    produtos: [],
    filtroCategoria: 'Todos',
    adminSenha: localStorage.getItem('admin_senha') || '',
    adminAutenticado: false,
    adminTab: 'estoque',
    salvando: false,
    kvConfigured: null
  };

  // ===== Utils =====
  const $ = (sel, el = document) => el.querySelector(sel);
  const main = () => document.getElementById('main');

  const fmtMoeda = v => `R$ ${(Number(v) || 0).toFixed(2).replace('.', ',')}`;
  const parseMoeda = s => {
    const n = parseFloat(String(s).replace(/[^\d,.-]/g, '').replace(',', '.'));
    return isNaN(n) ? 0 : n;
  };
  const uid = () => 'p' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
  const esc = s => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

  function toast(msg, type = '') {
    const div = document.createElement('div');
    div.className = 'toast ' + type;
    div.textContent = msg;
    document.getElementById('toasts').appendChild(div);
    setTimeout(() => div.remove(), 3000);
  }

  function calcMargem(custo, venda) {
    const c = Number(custo) || 0, v = Number(venda) || 0;
    if (v === 0) return 0;
    return ((v - c) / v) * 100;
  }

  async function comprimirImagem(file, maxSize = 600, quality = 0.82) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > h) {
          if (w > maxSize) { h = Math.round(h * maxSize / w); w = maxSize; }
        } else {
          if (h > maxSize) { w = Math.round(w * maxSize / h); h = maxSize; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(img.src);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = () => { URL.revokeObjectURL(img.src); reject(new Error('Erro ao ler imagem')); };
      img.src = URL.createObjectURL(file);
    });
  }

  function imgOrPlaceholder(p) {
    if (p.imagem) return `<img src="${esc(p.imagem)}" alt="${esc(p.nome)}" loading="lazy">`;
    const letra = (p.nome || '?').trim().charAt(0).toUpperCase();
    return `<span>${esc(letra)}</span>`;
  }

  // ===== API =====
  async function apiGet() {
    const r = await fetch(API);
    if (!r.ok) throw new Error('Erro ao carregar');
    return r.json();
  }

  async function apiGetAdmin() {
    const r = await fetch(API + '?admin=true', {
      headers: { 'X-Admin-Password': state.adminSenha }
    });
    if (r.status === 401) throw new Error('Senha incorreta');
    if (!r.ok) throw new Error('Erro ao carregar');
    return r.json();
  }

  async function apiPut(produtos) {
    const r = await fetch(API, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Admin-Password': state.adminSenha
      },
      body: JSON.stringify(produtos)
    });
    if (r.status === 401) throw new Error('Senha incorreta');
    if (!r.ok) {
      const data = await r.json().catch(() => ({}));
      throw new Error(data.error || 'Erro ao salvar');
    }
    return r.json();
  }

  async function salvar() {
    if (state.salvando) return;
    state.salvando = true;
    try {
      await apiPut(state.produtos);
      toast('Salvo', 'success');
    } catch (e) {
      toast(e.message || 'Erro ao salvar', 'error');
      // Reverte: recarrega do servidor
      try {
        const data = await apiGetAdmin();
        state.produtos = Array.isArray(data) ? data : (data.produtos || []);
        renderAdmin();
      } catch (_) {}
    } finally {
      state.salvando = false;
    }
  }

  // ===== Router =====
  function roteador() {
    const hash = (location.hash || '').replace('#', '');
    if (hash === 'admin') renderAdmin(); else renderPublico();
  }

  // ===== Public View =====
  async function renderPublico() {
    const el = main();
    el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

    try {
      const produtos = await apiGet();
      state.produtos = produtos;
    } catch (e) {
      el.innerHTML = `
        <div class="empty">
          <div class="empty-icon">⚠️</div>
          <p>Não foi possível carregar o estoque.</p>
          <p style="font-size:12px; margin-top:8px; color:var(--muted)">${esc(e.message)}</p>
        </div>`;
      return;
    }

    const categorias = ['Todos', ...CATEGORIAS.filter(c => state.produtos.some(p => p.categoria === c))];
    if (!categorias.includes(state.filtroCategoria)) state.filtroCategoria = 'Todos';

    const filtrados = state.filtroCategoria === 'Todos'
      ? state.produtos
      : state.produtos.filter(p => p.categoria === state.filtroCategoria);

    el.innerHTML = `
      <section class="hero">
        <h1>Mercadinho <em>do condomínio</em></h1>
        <p>Confira o que está disponível agora — peça com o zelador.</p>
      </section>

      <nav class="filters" role="tablist">
        ${categorias.map(c => `
          <button class="chip" data-cat="${esc(c)}" aria-pressed="${c === state.filtroCategoria}">${esc(c)}</button>
        `).join('')}
      </nav>

      ${filtrados.length === 0 ? `
        <div class="empty">
          <div class="empty-icon">🛒</div>
          <p>Nenhum produto disponível ${state.filtroCategoria !== 'Todos' ? 'nesta categoria' : 'no momento'}.</p>
        </div>
      ` : `
        <div class="grid">
          ${filtrados.map(p => `
            <article class="card">
              <div class="card-img">${imgOrPlaceholder(p)}</div>
              <div class="card-body">
                <span class="card-cat">${esc(p.categoria)}</span>
                <div class="card-name">${esc(p.nome)}</div>
                <div class="card-footer">
                  <span class="card-price">${fmtMoeda(p.precoVenda)}</span>
                  ${Number(p.quantidade) <= 3
                    ? `<span class="card-stock low">Últimas ${p.quantidade}</span>`
                    : `<span class="card-stock">${p.quantidade} un</span>`}
                </div>
              </div>
            </article>
          `).join('')}
        </div>
      `}
    `;

    el.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        state.filtroCategoria = chip.dataset.cat;
        renderPublico();
      });
    });
  }

  // ===== Admin Login =====
  function renderAdminLogin(erro) {
    main().innerHTML = `
      <a href="#" class="back-link">← Voltar para loja</a>
      <div class="login-box">
        <h2>Área do administrador</h2>
        <p>Digite a senha para gerenciar o estoque.</p>
        <form id="form-login" autocomplete="off">
          <input type="password" id="senha" placeholder="Senha" required autofocus>
          ${erro ? `<div style="color:var(--danger); font-size:13px; font-weight:600;">${esc(erro)}</div>` : ''}
          <button type="submit" class="btn">Entrar</button>
        </form>
      </div>
    `;

    $('#form-login').addEventListener('submit', async e => {
      e.preventDefault();
      const senha = $('#senha').value.trim();
      if (!senha) return;
      state.adminSenha = senha;
      try {
        const data = await apiGetAdmin();
        state.produtos = Array.isArray(data) ? data : (data.produtos || []);
        state.kvConfigured = data.kvConfigured !== false;
        state.adminAutenticado = true;
        localStorage.setItem('admin_senha', senha);
        renderAdminDashboard();
      } catch (err) {
        state.adminSenha = '';
        localStorage.removeItem('admin_senha');
        renderAdminLogin(err.message);
      }
    });
  }

  // ===== Admin Dashboard =====
  async function renderAdmin() {
    if (!state.adminAutenticado) {
      // Tenta com senha salva no storage
      if (state.adminSenha) {
        main().innerHTML = '<div class="loading"><div class="spinner"></div></div>';
        try {
          const data = await apiGetAdmin();
          state.produtos = Array.isArray(data) ? data : (data.produtos || []);
          state.kvConfigured = data.kvConfigured !== false;
          state.adminAutenticado = true;
          renderAdminDashboard();
          return;
        } catch (_) {
          state.adminSenha = '';
          localStorage.removeItem('admin_senha');
        }
      }
      renderAdminLogin();
      return;
    }
    renderAdminDashboard();
  }

  function renderAdminDashboard() {
    const el = main();
    el.innerHTML = `
      <a href="#" class="back-link">← Ver loja</a>
      <section class="hero">
        <h1>Painel <em>do admin</em></h1>
        <p>Gerencie seu estoque. As mudanças são salvas automaticamente.</p>
      </section>

      ${state.kvConfigured === false ? `
        <div style="background:var(--danger-soft); color:var(--danger); padding:14px; border-radius:var(--radius-sm); margin-bottom:18px; font-size:13px; font-weight:600;">
          ⚠️ Banco de dados (Vercel KV) não configurado. Mudanças não serão persistidas. Veja SETUP-MERCADINHO.md.
        </div>
      ` : ''}

      <div class="admin-tabs" role="tablist">
        <button class="admin-tab" data-tab="estoque" aria-pressed="${state.adminTab === 'estoque'}">Estoque (${state.produtos.length})</button>
        <button class="admin-tab" data-tab="adicionar" aria-pressed="${state.adminTab === 'adicionar'}">Adicionar</button>
      </div>

      <div id="admin-content"></div>
    `;

    el.querySelectorAll('.admin-tab').forEach(b => {
      b.addEventListener('click', () => {
        state.adminTab = b.dataset.tab;
        renderAdminDashboard();
      });
    });

    if (state.adminTab === 'estoque') renderAdminEstoque();
    else renderAdminAdicionar();
  }

  function renderAdminEstoque() {
    const cont = $('#admin-content');

    if (state.produtos.length === 0) {
      cont.innerHTML = `
        <div class="empty">
          <div class="empty-icon">📦</div>
          <p>Nenhum produto cadastrado.</p>
          <p style="font-size:12.5px; margin-top:6px;">Clique em <strong>Adicionar</strong> para cadastrar o primeiro.</p>
        </div>`;
      return;
    }

    cont.innerHTML = `<div class="stock-list">${state.produtos.map(p => stockItemHTML(p)).join('')}</div>`;

    state.produtos.forEach(p => bindStockItem(p));
  }

  function stockItemHTML(p) {
    const margem = calcMargem(p.precoCusto, p.precoVenda);
    const margemClass = margem < 20 ? 'low' : margem > 45 ? 'high' : '';
    const margemTxt = Number.isFinite(margem) ? `${margem.toFixed(0)}% margem` : '—';
    return `
      <div class="stock-item" data-id="${esc(p.id)}">
        <div class="thumb">${imgOrPlaceholder(p)}</div>
        <div class="stock-body">
          <div class="stock-row">
            <div style="min-width:0; flex:1;">
              <div class="stock-cat">${esc(p.categoria)}</div>
              <div class="stock-name">${esc(p.nome)}</div>
            </div>
            <button class="delete-btn" data-action="del" title="Excluir">🗑</button>
          </div>
          <div class="stock-price-row">
            <div class="price-field">
              <span>R$</span>
              <input type="text" inputmode="decimal" data-field="precoVenda" value="${(Number(p.precoVenda) || 0).toFixed(2).replace('.', ',')}">
            </div>
            <div class="qty-control">
              <button class="qty-btn" data-action="dec" ${p.quantidade <= 0 ? 'disabled' : ''}>−</button>
              <span class="qty-val">${p.quantidade}</span>
              <button class="qty-btn" data-action="inc">+</button>
            </div>
          </div>
          <div class="stock-meta">
            <span class="margin-badge ${margemClass}">${margemTxt}</span>
            <span style="font-size:11.5px; color:var(--muted);">Custo ${fmtMoeda(p.precoCusto)}</span>
          </div>
        </div>
      </div>`;
  }

  function bindStockItem(p) {
    const el = document.querySelector(`.stock-item[data-id="${p.id}"]`);
    if (!el) return;

    el.querySelector('[data-action="inc"]').addEventListener('click', () => {
      p.quantidade = Number(p.quantidade) + 1;
      atualizaItem(el, p);
      salvar();
    });

    el.querySelector('[data-action="dec"]').addEventListener('click', () => {
      if (p.quantidade <= 0) return;
      p.quantidade = Math.max(0, Number(p.quantidade) - 1);
      atualizaItem(el, p);
      salvar();
    });

    const precoInput = el.querySelector('[data-field="precoVenda"]');
    let timer;
    precoInput.addEventListener('input', () => {
      clearTimeout(timer);
      timer = setTimeout(() => {
        p.precoVenda = parseMoeda(precoInput.value);
        atualizaMargem(el, p);
        salvar();
      }, 600);
    });
    precoInput.addEventListener('blur', () => {
      clearTimeout(timer);
      p.precoVenda = parseMoeda(precoInput.value);
      precoInput.value = (Number(p.precoVenda) || 0).toFixed(2).replace('.', ',');
      atualizaMargem(el, p);
      salvar();
    });

    el.querySelector('[data-action="del"]').addEventListener('click', () => {
      if (!confirm(`Excluir "${p.nome}"?`)) return;
      state.produtos = state.produtos.filter(x => x.id !== p.id);
      salvar();
      renderAdminDashboard();
    });
  }

  function atualizaItem(el, p) {
    el.querySelector('.qty-val').textContent = p.quantidade;
    const dec = el.querySelector('[data-action="dec"]');
    dec.disabled = p.quantidade <= 0;
    atualizaMargem(el, p);
  }

  function atualizaMargem(el, p) {
    const m = calcMargem(p.precoCusto, p.precoVenda);
    const badge = el.querySelector('.margin-badge');
    badge.className = 'margin-badge ' + (m < 20 ? 'low' : m > 45 ? 'high' : '');
    badge.textContent = Number.isFinite(m) ? `${m.toFixed(0)}% margem` : '—';
  }

  // ===== Add product form =====
  function renderAdminAdicionar() {
    const cont = $('#admin-content');
    cont.innerHTML = `
      <form class="add-form" id="form-add" autocomplete="off">
        <div class="field">
          <label>Foto do produto</label>
          <label class="photo-drop" id="photo-drop">
            <span class="icon">📷</span>
            <span class="hint">Toque para escolher uma foto</span>
            <input type="file" id="foto-input" accept="image/*" capture="environment" hidden>
          </label>
        </div>

        <div class="field">
          <label>Nome</label>
          <input type="text" id="f-nome" placeholder="Ex: Coca-Cola Lata 350ml" required maxlength="80">
        </div>

        <div class="field">
          <label>Categoria</label>
          <select id="f-categoria" required>
            <option value="">Selecione…</option>
            ${CATEGORIAS.map(c => `<option value="${c}">${c}</option>`).join('')}
          </select>
        </div>

        <div class="field-row">
          <div class="field">
            <label>Preço de custo</label>
            <input type="text" inputmode="decimal" id="f-custo" placeholder="0,00">
          </div>
          <div class="field">
            <label>Preço de venda</label>
            <input type="text" inputmode="decimal" id="f-venda" placeholder="0,00" required>
          </div>
        </div>

        <div class="field">
          <label>Quantidade inicial</label>
          <input type="number" id="f-qtd" min="0" value="1" required>
        </div>

        <div class="margin-preview">
          <span class="label">Margem</span>
          <span class="value" id="margin-live">—</span>
        </div>

        <button type="submit" class="btn" id="btn-add">Adicionar ao estoque</button>
      </form>
    `;

    const dropEl = $('#photo-drop');
    const input = $('#foto-input');
    let imagem = null;

    dropEl.addEventListener('click', () => input.click());

    input.addEventListener('change', async e => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      if (!file.type.startsWith('image/')) { toast('Arquivo precisa ser uma imagem', 'error'); return; }
      try {
        imagem = await comprimirImagem(file);
        dropEl.innerHTML = `<img src="${imagem}" alt="preview">`;
      } catch (err) {
        toast('Erro ao processar imagem', 'error');
      }
    });

    const custoEl = $('#f-custo'), vendaEl = $('#f-venda'), mLive = $('#margin-live');
    const atualizaMarg = () => {
      const c = parseMoeda(custoEl.value), v = parseMoeda(vendaEl.value);
      if (v === 0) { mLive.textContent = '—'; mLive.classList.remove('negative'); return; }
      const m = ((v - c) / v) * 100;
      mLive.textContent = `${m.toFixed(0)}%`;
      mLive.classList.toggle('negative', m < 0);
    };
    custoEl.addEventListener('input', atualizaMarg);
    vendaEl.addEventListener('input', atualizaMarg);

    $('#form-add').addEventListener('submit', async e => {
      e.preventDefault();
      const nome = $('#f-nome').value.trim();
      const categoria = $('#f-categoria').value;
      const precoCusto = parseMoeda(custoEl.value);
      const precoVenda = parseMoeda(vendaEl.value);
      const quantidade = Math.max(0, parseInt($('#f-qtd').value, 10) || 0);

      if (!nome || !categoria || precoVenda <= 0) {
        toast('Preencha os campos obrigatórios', 'error');
        return;
      }

      const novo = {
        id: uid(),
        nome,
        categoria,
        precoCusto,
        precoVenda,
        quantidade,
        imagem
      };

      const btn = $('#btn-add');
      btn.disabled = true;
      btn.textContent = 'Salvando…';

      state.produtos.push(novo);
      try {
        await apiPut(state.produtos);
        toast('Produto adicionado', 'success');
        state.adminTab = 'estoque';
        renderAdminDashboard();
      } catch (err) {
        state.produtos.pop();
        toast(err.message || 'Erro ao salvar', 'error');
        btn.disabled = false;
        btn.textContent = 'Adicionar ao estoque';
      }
    });
  }

  // ===== Bootstrap =====
  document.getElementById('admin-btn').addEventListener('click', () => {
    location.hash = 'admin';
  });

  window.addEventListener('hashchange', roteador);
  roteador();
})();
</script>
</body>
</html>
