// ════════════════════════════════════════════════════════════════════
// VALIDADORES
// ════════════════════════════════════════════════════════════════════
function contaPaginas(html) {
  var m = html.match(/<div class="pdf-page/g);
  return m ? m.length : 0;
}

function temPlaceholders(html) {
  // Detecta {coisas}, {NN}, {placeholder}, etc não substituídos
  var matches = html.match(/\{[A-Za-zÀ-ÿ_][A-Za-zÀ-ÿ_ 0-9·\-–—\.,\/]{1,60}\}/g) || [];
  // Ignora padrões CSS dentro de string (raro mas possível)
  return matches.filter(function(m){
    return !/^\{(NN|[0-9]+)\}$/.test(m); // NN já deveria estar substituído
  });
}

function validaConsistenciaInstagram(html, research) {
  // Se research tem followers definido, verifica que NÃO aparecem números inventados
  // de followers no HTML (heurística: procura "X seguidores" e cruza com research.instagram.followers)
  var pat = /(\d[\d\.,]*)\s*seguidores/gi;
  var encontrados = [];
  var m;
  while ((m = pat.exec(html)) !== null) {
    var num = parseInt(m[1].replace(/\D/g, ''), 10);
    if (!isNaN(num) && num > 100) encontrados.push(num);
  }
  if (!encontrados.length) return { ok: true, msg: 'sem números de seguidores citados (ok se research null)' };

  var realFollowers = research && research.instagram && research.instagram.followers;
  var concorrentes = (research && research.concorrentes) || [];
  var validos = [realFollowers].concat(concorrentes.map(function(c){ return c.followers; })).filter(Boolean);

  // Aceita se o número está dentro de 5% de algum valor real (margem de arredondamento)
  var suspeitos = encontrados.filter(function(n) {
    return !validos.some(function(v) { return Math.abs(n - v) / v < 0.05; });
  });

  if (suspeitos.length === 0) return { ok: true, msg: encontrados.length + ' números de seguidores, todos batem com research' };
  return { ok: false, msg: 'Números suspeitos (não batem com research): ' + suspeitos.join(', ') + '. Esperado: ' + validos.join(', ') };
}

function contaPalavras(txt) {
  return (txt.trim().match(/\S+/g) || []).length;
}

function validaCharsCard(html) {
  // Mede em PALAVRAS (Haiku respeita melhor que char count) e em CHAR como fallback.
  var doc = new DOMParser().parseFromString(html, 'text/html');
  var problemas = [];
  doc.querySelectorAll('.v-body').forEach(function(el, i) {
    var w = contaPalavras(el.textContent);
    var max = el.closest('.v-card.full') ? 40 : 32;
    if (w > max) problemas.push('v-body[' + i + ']=' + w + 'w (max ' + max + 'w)');
  });
  doc.querySelectorAll('.bench-impact').forEach(function(el, i) {
    var w = contaPalavras(el.textContent);
    if (w > 20) problemas.push('bench-impact[' + i + ']=' + w + 'w (max 20w)');
  });
  doc.querySelectorAll('.d-body').forEach(function(el, i) {
    var w = contaPalavras(el.textContent);
    if (w > 25) problemas.push('d-body[' + i + ']=' + w + 'w (max 25w)');
  });
  doc.querySelectorAll('.bench-col-sub').forEach(function(el, i) {
    var w = contaPalavras(el.textContent);
    if (w > 8) problemas.push('bench-col-sub[' + i + ']=' + w + 'w (max 8w)');
  });
  return problemas;
}

// ════════════════════════════════════════════════════════════════════
// EXECUÇÃO
// ════════════════════════════════════════════════════════════════════
function log(msg, level) {
  var el = document.getElementById('global-log');
  var line = document.createElement('div');
  line.className = 'L-' + (level || 'info');
  line.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function planejarPaginas(d) {
  var canais = (d.canais || '').split(',').map(function(c){ return c.trim(); }).filter(Boolean);
  // Espelha planejarPaginas do diagnostico.html (versão enxuta)
  var paginas = ['cover', 'problems-1', 'mercado', 'verticais'];
  if (d.com_proposta === 'Sim' && d.plano) paginas.push('investimento');
  paginas.push('modulos', 'hub-why');
  return paginas;
}

async function rodarCenario(scn) {
  var btn = document.querySelector('[data-scn="' + scn.id + '"] button');
  var status = document.querySelector('[data-scn="' + scn.id + '"] .status');
  var checks = document.querySelector('[data-scn="' + scn.id + '"] .checks');
  var card = document.querySelector('[data-scn="' + scn.id + '"]');

  btn.disabled = true;
  status.innerHTML = '⏳ Pesquisando...';
  checks.innerHTML = '';
  log('▶ Cenário "' + scn.id + '" iniciado', 'info');

  try {
    // FASE 1: research
    var t0 = Date.now();
    var rRes = await apiFetch('/api/diagnostico-research', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ lead: scn.lead })
    });
    if (!rRes.ok) {
      var err = await rRes.text();
      throw new Error('Research falhou: ' + err.slice(0, 200));
    }
    var resData = await rRes.json();
    var research = resData.research;
    var tResearch = Date.now() - t0;
    log('✓ Research OK em ' + tResearch + 'ms (' + (resData.tokens && resData.tokens.searches) + ' searches)', 'ok');
    status.innerHTML = '⏳ Pesquisa OK. Gerando páginas...';

    // FASE 2: páginas
    var paginas = planejarPaginas(scn.lead);
    var total = paginas.length;
    log('  Planejou ' + total + ' páginas: ' + paginas.join(','), 'info');

    // Tier-1: research (Sonnet+web_search ~15-25k) e paginas (Sonnet) dividem
    // o balde de 30k input tok/min. Espera a janela de 60s liberar.
    log('  Aguardando 45s pos-research (rate limit 30k/min compartilhado)...', 'warn');
    await new Promise(function(r){ setTimeout(r, 45000); });

    var t1 = Date.now();
    var resultados = [];
    // Sequencial + retry em 429 (sequencial sozinho ~19k/min, abaixo de 30k)
    for (var i = 0; i < paginas.length; i++) {
      var page = paginas[i];
      var pgData = null;
      for (var tent = 1; tent <= 4; tent++) {
        var pgResp = await apiFetch('/api/diagnostico-page', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ page: page, lead: scn.lead, pageNumber: i + 1, totalPages: total, research: research })
        });
        if (pgResp.ok) { pgData = await pgResp.json(); break; }
        var pgErr = await pgResp.text();
        var isRL = pgResp.status === 429 || pgErr.indexOf('rate_limit') >= 0;
        if (isRL && tent < 4) {
          log('  "' + page + '" rate limit, aguardando 35s (tent ' + tent + ')...', 'warn');
          await new Promise(function(r){ setTimeout(r, 35000); });
          continue;
        }
        throw new Error('Página "' + page + '" falhou: ' + pgErr.slice(0, 200));
      }
      resultados.push(pgData);
      var attemptStr = pgData.attempts > 1 ? ' [' + pgData.attempts + ' tent.]' : '';
      var warnStr = pgData.validation_warnings ? ' ⚠ ' + pgData.validation_warnings.join(', ') : '';
      log('  ✓ ' + page + attemptStr + ' (' + pgData.tokens.input + ' in / ' + pgData.tokens.output + ' out)' + warnStr,
        pgData.validation_warnings ? 'warn' : 'info');
    }
    var tPages = Date.now() - t1;
    log('✓ Páginas OK em ' + tPages + 'ms', 'ok');

    var htmlCompleto = resultados.map(function(r){ return r.html; }).join('\n');

    // Guarda o ultimo run para reaproveitar SEM gastar API (baixar HTML / inspecao offline)
    window.__lastHtml = htmlCompleto;
    window.__lastId = scn.id;
    try { localStorage.setItem('diag_last_html', htmlCompleto); localStorage.setItem('diag_last_id', scn.id); } catch (e) {}

    // ─── VALIDAÇÕES ───
    var nPages = contaPaginas(htmlCompleto);
    addCheck(checks, 'Páginas geradas: ' + nPages + ' (esperado ' + scn.espera.paginasMin + '–' + scn.espera.paginasMax + ')',
      nPages >= scn.espera.paginasMin && nPages <= scn.espera.paginasMax);

    var placeholders = temPlaceholders(htmlCompleto);
    addCheck(checks, 'Sem placeholders {x} não substituídos' + (placeholders.length ? ': ' + placeholders.slice(0, 3).join(', ') : ''),
      placeholders.length === 0);

    // Detecção de páginas pelo header (.page-number contém "NN · INVESTIMENTO" / "NN · SEO")
    // Evita falso positivo de menção casual da palavra no corpo de outro card.
    var inv = /·\s*INVESTIMENTO\s*</.test(htmlCompleto);
    addCheck(checks, 'Página Investimento ' + (scn.espera.temInvestimento ? 'presente' : 'ausente'),
      inv === scn.espera.temInvestimento);

    var seo = /·\s*SEO\s*</.test(htmlCompleto);
    addCheck(checks, 'Página SEO ' + (scn.espera.temSeo ? 'presente' : 'ausente'),
      seo === scn.espera.temSeo);

    var consist = validaConsistenciaInstagram(htmlCompleto, research);
    addCheck(checks, consist.msg, consist.ok);

    var overflowProblemas = validaCharsCard(htmlCompleto);
    addCheck(checks, overflowProblemas.length === 0 ? 'Limites de char OK' : 'Overflow: ' + overflowProblemas.slice(0, 3).join('; '),
      overflowProblemas.length === 0);

    status.innerHTML = '✓ Concluído em ' + ((Date.now() - t0)/1000).toFixed(1) + 's';

    // Preview em iframe
    var blob = new Blob([
      '<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300..900;1,300..900&family=Manrope:wght@200..800&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet"><title>Preview ' + scn.id + '</title>',
      document.querySelector('style').outerHTML,
      '</head><body style="background:#0a1628;margin:0;padding:20px;">',
      htmlCompleto,
      '</body></html>'
    ], { type: 'text/html' });
    var url = URL.createObjectURL(blob);
    var existing = card.querySelector('iframe');
    if (existing) existing.remove();
    var ifr = document.createElement('iframe');
    ifr.src = url;
    card.appendChild(ifr);

    log('✓ Cenário "' + scn.id + '" concluído', 'ok');
  } catch (err) {
    status.innerHTML = '✗ Erro';
    addCheck(checks, err.message, false);
    log('✗ Cenário "' + scn.id + '" falhou: ' + err.message, 'err');
  } finally {
    btn.disabled = false;
  }
}

// Baixa o HTML do ultimo run, ja embrulhado com o CSS real do diagnostico.
// Abrir no navegador + Imprimir > Salvar como PDF (A4) = ver o resultado REAL, custo ZERO de API.
async function baixarHtml() {
  var html = window.__lastHtml || localStorage.getItem('diag_last_html');
  var id = window.__lastId || localStorage.getItem('diag_last_id') || 'run';
  if (!html) { alert('Rode um cenario primeiro (ou ja exista um run salvo).'); return; }
  var css = '';
  try {
    var r = await fetch('diagnostico.html');
    var txt = await r.text();
    var m = txt.match(/<style[^>]*>([\s\S]*?)<\/style>/i);
    if (m) css = m[1];
  } catch (e) { /* sem CSS: cai no fallback sem estilo */ }
  var doc = '<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8">' +
    '<link rel="preconnect" href="https://fonts.googleapis.com">' +
    '<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300..900;1,300..900&family=Manrope:wght@200..800&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">' +
    '<style>' + css + '</style><title>Diagnostico ' + id + '</title></head><body>' + html + '</body></html>';
  var blob = new Blob([doc], { type: 'text/html' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'diagnostico-' + id + '.html';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 10000);
}

function addCheck(container, msg, ok) {
  var d = document.createElement('div');
  d.className = 'check ' + (ok ? 'ok' : 'err');
  d.textContent = (ok ? '✓ ' : '✗ ') + msg;
  container.appendChild(d);
}

async function runAll() {
  for (var i = 0; i < SCENARIOS.length; i++) {
    await rodarCenario(SCENARIOS[i]);
    if (i < SCENARIOS.length - 1) {
      // Pausa 25s entre cenários: research usa Sonnet (30k input tok/min).
      // Sem pausa, 5 researches seguidos batem no rate limit.
      log('⏸ Pausa 25s antes do próximo cenário (rate limit do research)...', 'warn');
      await new Promise(function(r){ setTimeout(r, 25000); });
    }
  }
  log('═══ TODOS os cenários concluídos ═══', 'ok');
}

// ─── RENDER ───
function renderScenarios() {
  var c = document.getElementById('scenarios');
  SCENARIOS.forEach(function(scn) {
    var card = document.createElement('div');
    card.className = 'scn';
    card.setAttribute('data-scn', scn.id);
    card.innerHTML =
      '<h3>' + scn.nome + '</h3>' +
      '<div class="desc">' + scn.desc + '</div>' +
      '<button onclick="rodarCenario(SCENARIOS.find(s=>s.id===\'' + scn.id + '\'))">▶ Rodar</button>' +
      '<div class="status"></div>' +
      '<div class="checks"></div>';
    c.appendChild(card);
  });
}
renderScenarios();
</script>
